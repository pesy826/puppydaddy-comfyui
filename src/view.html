<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ComfyUI Control</title>
  <style>
    :root{color-scheme:light;--bg:#f5f7fb;--panel:#fff;--line:#dce2ec;--ink:#182033;--muted:#68748a;--accent:#315fd6;--accent2:#2449a8;--ok:#16835d;--warn:#b76b12;--danger:#c43c4e;--terminal:#111827;--termInk:#dbe5f5}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 Inter,system-ui,sans-serif}button,input{font:inherit}button{cursor:pointer}.app{height:100vh;display:grid;grid-template-rows:auto 1fr;overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:20px 26px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.92)}.brand{display:flex;align-items:center;gap:13px}.mark{width:34px;height:34px;border-radius:10px;background:var(--accent);display:grid;place-items:center;color:#fff;font-weight:800}.title{font-size:18px;font-weight:750}.sub{font-size:12px;color:var(--muted)}.status{display:flex;align-items:center;gap:9px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}.dot{width:8px;height:8px;border-radius:50%;background:#9aa5b6}.dot.running{background:var(--ok);box-shadow:0 0 0 4px #16835d18}.dot.error{background:var(--danger)}.main{min-height:0;display:grid;grid-template-columns:minmax(300px,390px) 1fr;gap:18px;padding:18px}.side,.console{min-height:0;border:1px solid var(--line);border-radius:15px;background:var(--panel);overflow:hidden}.side{padding:20px;overflow:auto}.eyebrow{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}h2{font-size:16px;margin:5px 0 16px}.field{margin:14px 0}.field label{display:block;margin-bottom:6px;font-size:11px;font-weight:700;color:var(--muted)}input{width:100%;height:40px;border:1px solid var(--line);border-radius:9px;padding:0 11px;color:var(--ink);outline:none}input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #315fd617}.hint{margin-top:6px;color:var(--muted);font-size:11px;line-height:1.45}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px}.btn{height:38px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-weight:700}.btn:hover{border-color:#aab7ca}.btn.primary{grid-column:1/-1;background:var(--accent);border-color:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent2)}.btn.danger{color:var(--danger)}.btn:disabled{cursor:not-allowed;opacity:.45}.facts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px}.fact{padding:10px;border:1px solid var(--line);border-radius:9px;background:#f9fafc}.fact span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase}.fact b{display:block;margin-top:3px;font:600 12px ui-monospace,monospace;overflow:hidden;text-overflow:ellipsis}.notice{min-height:38px;margin-top:14px;padding:9px 10px;border-radius:9px;background:#f3f6fb;color:var(--muted);font-size:12px}.notice.error{background:#fff0f2;color:var(--danger)}.console{display:grid;grid-template-rows:auto 1fr;background:var(--terminal);border-color:#293247}.consoleHead{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid #293247;color:#c8d2e3}.consoleHead button{border:0;background:transparent;color:#9aa8bd;font-size:12px}.logs{overflow:auto;padding:15px;color:var(--termInk);font:12px/1.55 ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap;word-break:break-word}.line.stderr{color:#ff9fab}.line.system{color:#87aef8}.empty{color:#718097}@media(max-width:800px){.main{grid-template-columns:1fr;overflow:auto}.side{min-height:max-content}.console{min-height:420px}.app{overflow:auto}}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><div class="mark">C</div><div><div class="title">ComfyUI Control</div><div class="sub">本机进程与终端 · 由 Extension Host 管理</div></div></div>
    <div class="status"><i id="dot" class="dot"></i><strong id="phase">等待状态</strong><span id="ready" class="sub"></span></div>
  </header>
  <main class="main">
    <section class="side">
      <div class="eyebrow">Local runtime</div><h2>启动配置</h2>
      <div class="field"><label for="root">ComfyUI 目录</label><input id="root" spellcheck="false" placeholder="H:\ComfyUI 或 H:\ComfyUI_windows_portable"><div class="hint">请手动填写 ComfyUI 目录、Windows portable 目录，或直接包含 ComfyUI_windows_portable 的上级目录。</div></div>
      <div class="field"><label for="port">监听端口</label><input id="port" type="number" min="1024" max="65535" value="8188"></div>
      <div class="actions"><button id="start" class="btn primary">启动 ComfyUI</button><button id="stop" class="btn danger">停止</button><button id="restart" class="btn">重启</button></div>
      <div class="facts">
        <div class="fact"><span>PID</span><b id="pid">—</b></div><div class="fact"><span>Launch</span><b id="kind">—</b></div>
        <div class="fact"><span>API</span><b id="url">—</b></div><div class="fact"><span>Exit code</span><b id="exit">—</b></div>
      </div>
      <div id="notice" class="notice">正在连接 Extension Host…</div>
    </section>
    <section class="console"><div class="consoleHead"><span>COMFYUI TERMINAL · STDOUT / STDERR</span><button id="clear">清空日志</button></div><div id="logs" class="logs"><span class="empty">等待 Host 日志…</span></div></section>
  </main>
</div>
<script>
(() => {
  'use strict'
  const api = window.puppyExtension
  const $ = (id) => document.getElementById(id)
  let state = { phase: 'stopped', logs: [] }
  let seq = 0
  const pending = new Set()
  const labels = {stopped:'已停止',starting:'启动中',running:'运行中',stopping:'停止中',error:'错误'}
  function request(action, extra={}) {
    const requestId = `view_${Date.now().toString(36)}_${++seq}`
    pending.add(requestId); render()
    api.postMessage('comfyui.request',{requestId,action,...extra})
  }
  function setNotice(text,error=false){$('notice').textContent=text;$('notice').className=`notice${error?' error':''}`}
  function render(){
    $('phase').textContent=labels[state.phase]||state.phase||'未知'
    $('ready').textContent=state.ready?'API ready':''
    $('dot').className=`dot ${state.phase==='error'?'error':state.phase==='running'&&state.ready?'running':''}`
    $('pid').textContent=state.pid??'—';$('kind').textContent=state.launchKind??'—';$('url').textContent=state.url??'—';$('exit').textContent=state.exitCode??'—'
    if (typeof state.rootPath==='string' && document.activeElement!==$('root')) $('root').value=state.rootPath
    if (state.port && document.activeElement!==$('port')) $('port').value=String(state.port)
    const busy=pending.size>0||['starting','stopping'].includes(state.phase)
    $('start').disabled=busy||state.phase==='running';$('stop').disabled=busy||!['running','starting','error'].includes(state.phase);$('restart').disabled=busy||!state.rootPath
    if(state.error)setNotice(state.error,true)
    renderLogs()
  }
  function renderLogs(){
    const box=$('logs'),atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<40
    box.textContent=''
    const entries=Array.isArray(state.logs)?state.logs:[]
    if(!entries.length){const empty=document.createElement('span');empty.className='empty';empty.textContent='等待 Host 日志…';box.appendChild(empty);return}
    for(const entry of entries){const line=document.createElement('div');line.className=`line ${entry.stream||''}`;line.textContent=`[${new Date(entry.ts).toLocaleTimeString()}] ${entry.text}`;box.appendChild(line)}
    if(atBottom)box.scrollTop=box.scrollHeight
  }
  api.onMessage((channel,payload)=>{
    if(channel==='comfyui.state'&&payload&&typeof payload==='object'){state=payload;render()}
    else if(channel==='comfyui.log'&&payload&&typeof payload==='object'){state.logs=[...(state.logs||[]),payload].slice(-1200);renderLogs()}
    else if(channel==='comfyui.result'&&payload&&typeof payload==='object'){pending.delete(payload.requestId);setNotice(payload.message||'',!payload.ok);render()}
  })
  const config=()=>({rootPath:$('root').value.trim(),port:Number($('port').value)})
  $('start').onclick=()=>request('start',config());$('stop').onclick=()=>request('stop');$('restart').onclick=()=>request('restart',config());$('clear').onclick=()=>request('clearLogs')
  request('snapshot')
})()
</script>
</body>
</html>
